<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Memory</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h1 { color: #333; }
        .audio-controls { margin: 20px 0; }
        
        /* Custom Media Player */
        .custom-player {
            background: #eee;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .play-btn {
            background: #007bff;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .progress-container {
            flex-grow: 1;
            height: 8px;
            background: #ccc;
            border-radius: 4px;
            position: relative;
            cursor: pointer;
        }
        .progress-bar {
            height: 100%;
            background: #007bff;
            width: 0%;
            border-radius: 4px;
        }
        .time { font-size: 0.8rem; min-width: 85px; text-align: left; }

        .options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-top: 20px;
        }
        button {
            padding: 12px;
            font-size: 1rem;
            cursor: pointer;
            border: 2px solid #007bff;
            background: white;
            color: #007bff;
            border-radius: 6px;
            transition: all 0.2s;
        }
        button:hover:not(:disabled) {
            background: #007bff;
            color: white;
        }
        button:disabled {
            border-color: #ccc;
            color: #999;
            cursor: not-allowed;
        }
        .correct { background: #28a745 !important; color: white !important; border-color: #28a745 !important; }
        .incorrect { background: #dc3545 !important; color: white !important; border-color: #dc3545 !important; }
        #feedback {
            margin-top: 20px;
            font-weight: bold;
            min-height: 1.5em;
        }
        #score-screen { display: none; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container" id="quiz-container">
    <h1>Music Memory</h1>
    <div id="progress">Question 1 of 16</div>
    
    <div class="audio-controls">
        <audio id="audio-player"></audio>
        <div class="custom-player">
            <button id="play-pause" class="play-btn">▶</button>
            <div class="progress-container" id="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div class="time" id="time-display">0:00 / 0:00</div>
        </div>
    </div>

    <div id="feedback"></div>

    <div class="options" id="options-container">
        <!-- Options will be injected here -->
    </div>

    <button id="next-btn" class="hidden" style="margin-top: 20px; background: #007bff; color: white;">Next Question</button>
</div>

<div class="container" id="score-screen">
    <h1>Quiz Completed!</h1>
    <p id="final-score"></p>
    <button onclick="location.reload()" style="background: #28a745; color: white; border: none;">Restart Quiz</button>
</div>

<script>
    const tracks = [
        { name: "Symphonie Fantastique (movement 4)", composer: "Hector Berlioz", file: "berlioz_fantastique.mp3" },
        { name: "La Habanera (from Carmen)", composer: "Georges Bizet", file: "bizet_habanera.mp3" },
        { name: "Polovtsian Dances (from Prince Igor Suite)", composer: "Alexander Borodin", file: "borodin_polovtsian.mp3" },
        { name: "Symphony No 3 (movement 3)", composer: "Johannes Brahms", file: "brahms_symphony3.mp3" },
        { name: "Sonata V (from Sonatas and Interludes)", composer: "John Cage", file: "cage_sonata5.mp3" },
        { name: "Nocturne Op.9 No. 2", composer: "Frederic Chopin", file: "chopin_nocturne.mp3" },
        { name: "Prélude à l'Après-midi d'un faune", composer: "Claude Debussy", file: "debussy_faune.mp3" },
        { name: "New World Symphony (No. 9), mvt 1", composer: "Antonin Dvorak", file: "dvorak_newworld.mp3" },
        { name: "Morning Mood (from Peer Gynt Suite)", composer: "Edvard Grieg", file: "grieg_morning.mp3" },
        { name: "Country Band March", composer: "Charles Ives", file: "ives_countryband.mp3" },
        { name: "La Campanella", composer: "Franz Liszt", file: "liszt_campanella.mp3" },
        { name: "O Fortuna (from Carmina Burana)", composer: "Carl Orff", file: "orff_ofortuna.mp3" },
        { name: "Danse Macabre", composer: "Camille Saint-Saens", file: "saintsaens_danse.mp3" },
        { name: "Der Mondfleck (from Pierrot Lunaire)", composer: "Arnold Schoenberg", file: "schoenberg_mondfleck.mp3" },
        { name: "Erlkonig", composer: "Franz Schubert", file: "schubert_erlkonig.mp3" },
        { name: "Rite of Spring", composer: "Igor Stravinsky", file: "stravinsky_rite.mp3" },
        { name: "Rhapsody in Blue", composer: "George Gershwin", file: "gershwin_rhapsody.mp3" },
    ];

    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;

    // Custom Player Logic
    const player = document.getElementById('audio-player');
    const playBtn = document.getElementById('play-pause');
    const progressBar = document.getElementById('progress-bar');
    const progressContainer = document.getElementById('progress-container');
    const timeDisplay = document.getElementById('time-display');

    playBtn.addEventListener('click', () => {
        if (player.paused || player.ended) {
            player.play();
            playBtn.innerText = '⏸';
        } else {
            player.pause();
            playBtn.innerText = '▶';
        }
    });

    // Reset button icon when audio ends naturally
    player.addEventListener('ended', () => {
        playBtn.innerText = '▶';
    });

    player.addEventListener('timeupdate', () => {
        const percent = (player.currentTime / player.duration) * 100;
        progressBar.style.width = `${percent}%`;
        
        const curMin = Math.floor(player.currentTime / 60);
        const curSec = Math.floor(player.currentTime % 60).toString().padStart(2, '0');
        const durMin = Math.floor(player.duration || 0) / 60;
        const durSec = Math.floor(player.duration || 0) % 60;
        
        if (!isNaN(player.duration)) {
            timeDisplay.innerText = `${curMin}:${curSec} / ${Math.floor(durMin)}:${Math.floor(durSec).toString().padStart(2, '0')}`;
        }
    });

    progressContainer.addEventListener('click', (e) => {
        const width = progressContainer.clientWidth;
        const clickX = e.offsetX;
        const duration = player.duration;
        player.currentTime = (clickX / width) * duration;
    });

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function initQuiz() {
        currentQuestions = shuffle([...tracks]);
        showQuestion();
    }

    function showQuestion() {
        const question = currentQuestions[currentIndex];
        document.getElementById('progress').innerText = `Question ${currentIndex + 1} of ${currentQuestions.length}`;
        player.src = `audio/${question.file}`;
        player.load();
        playBtn.innerText = '▶';
        progressBar.style.width = '0%';
        
        const feedback = document.getElementById('feedback');
        feedback.innerText = '';
        feedback.className = '';

        const nextBtn = document.getElementById('next-btn');
        nextBtn.classList.add('hidden');

        // Generate options (1 correct + 3 random)
        let options = [question];
        let others = tracks.filter(t => t.file !== question.file);
        shuffle(others);
        options = options.concat(others.slice(0, 3));
        shuffle(options);

        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        options.forEach(opt => {
            const btn = document.createElement('button');
            const label = `${opt.composer} - ${opt.name}`;
            btn.innerText = label;
            btn.onclick = () => checkAnswer(btn, opt, question);
            container.appendChild(btn);
        });
    }

    function checkAnswer(selectedBtn, selectedOpt, correctTrack) {
        const buttons = document.querySelectorAll('#options-container button');
        buttons.forEach(btn => btn.disabled = true);

        const feedback = document.getElementById('feedback');
        const correctLabel = `${correctTrack.composer} - ${correctTrack.name}`;

        if (selectedOpt.file === correctTrack.file) {
            selectedBtn.classList.add('correct');
            feedback.innerText = "Correct!";
            feedback.style.color = "#28a745";
            score++;
        } else {
            selectedBtn.classList.add('incorrect');
            feedback.innerText = `Incorrect. The answer was: ${correctLabel}`;
            feedback.style.color = "#dc3545";
            
            // Highlight the correct one
            buttons.forEach(btn => {
                if (btn.innerText === correctLabel) {
                    btn.classList.add('correct');
                }
            });
        }

        const nextBtn = document.getElementById('next-btn');
        nextBtn.classList.remove('hidden');
        nextBtn.onclick = () => {
            currentIndex++;
            if (currentIndex < currentQuestions.length) {
                showQuestion();
            } else {
                showResults();
            }
        };
    }

    function showResults() {
        document.getElementById('quiz-container').style.display = 'none';
        const scoreScreen = document.getElementById('score-screen');
        scoreScreen.style.display = 'block';
        document.getElementById('final-score').innerText = `You scored ${score} out of ${currentQuestions.length} (${Math.round(score/currentQuestions.length*100)}%)`;
    }

    initQuiz();
</script>

</body>
</html>
