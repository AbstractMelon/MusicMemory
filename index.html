<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Memory</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow: hidden;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
            max-height: 90vh;
            overflow-y: auto;
        }
        h1 { color: #333; }
        .audio-controls { margin: 20px 0; }
        
        /* Custom Media Player */
        .custom-player {
            background: #eee;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .play-btn {
            background: #007bff;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .progress-container {
            flex-grow: 1;
            height: 8px;
            background: #ccc;
            border-radius: 4px;
            position: relative;
            cursor: pointer;
        }
        .progress-bar {
            height: 100%;
            background: #007bff;
            width: 0%;
            border-radius: 4px;
        }
        .time { font-size: 0.8rem; min-width: 85px; text-align: left; }

        .options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-top: 20px;
        }
        button {
            padding: 12px;
            font-size: 1rem;
            cursor: pointer;
            border: 2px solid #007bff;
            background: white;
            color: #007bff;
            border-radius: 6px;
            transition: all 0.2s;
        }
        button:hover:not(:disabled) {
            background: #007bff;
            color: white;
        }
        button:disabled {
            border-color: #ccc;
            color: #999;
            cursor: not-allowed;
        }
        .correct { background: #28a745 !important; color: white !important; border-color: #28a745 !important; }
        .incorrect { background: #dc3545 !important; color: white !important; border-color: #dc3545 !important; }
        #feedback {
            margin-top: 20px;
            font-weight: bold;
            min-height: 1.5em;
        }
        #score-screen { display: none; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container" id="quiz-container">
    <h1>Music Memory</h1>
    <div id="progress">Question 1 of 17</div>
    
    <div class="audio-controls">
        <audio id="audio-player"></audio>
        <div class="custom-player">
            <button id="play-pause" class="play-btn"><i data-lucide="play"></i></button>
            <div class="progress-container" id="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div class="time" id="time-display">0:00 / 0:00</div>
        </div>
    </div>

    <div id="feedback"></div>

    <div class="options" id="options-container">
        <!-- Options will be injected here -->
    </div>

    <button id="next-btn" class="hidden" style="margin-top: 20px; background: #007bff; color: white;">Next Question</button>
</div>

<div class="container" id="score-screen">
    <h1>Quiz Completed!</h1>
    <p id="final-score" style="font-weight: bold; font-size: 1.2rem;"></p>
    <div style="width: 100%; max-width: 500px; margin: 20px auto;">
        <canvas id="scoreChart"></canvas>
    </div>
    <div id="overview-container" style="text-align: left; margin-top: 20px; margin-bottom: 20px;"></div>
    <div style="display: flex; gap: 10px; justify-content: center;">
        <button onclick="location.reload()" style="background: #28a745; color: white; border: none; padding: 12px 24px;">Restart Quiz</button>
        <button id="review-missed-btn" class="hidden" onclick="reviewMissed()" style="background: #ffc107; color: white; border: none; padding: 12px 24px;">Review Missed</button>
    </div>
</div>

<script>
    const tracks = [
        { name: "Symphonie Fantastique (movement 4)", composer: "Hector Berlioz", file: "Hector Berlioz - Symphonie Fantastique (movement 4).m4a" },
        { name: "La Habanera (from Carmen)", composer: "Georges Bizet", file: "Georges Bizet - La Habanera (from Carmen).m4a" },
        { name: "Polovtsian Dances (from Prince Igor Suite)", composer: "Alexander Borodin", file: "Alexander Borodin - Polovtsian Dances (from Prince Igor Suite).m4a" },
        { name: "Symphony No 3 (movement 3)", composer: "Johannes Brahms", file: "Johannes Brahms - Symphony No 3 (movement 3).m4a" },
        { name: "Sonata V (from Sonatas and Interludes)", composer: "John Cage", file: "John Cage - Sonata V (from Sonatas and Interludes).m4a" },
        { name: "Nocturne Op.9 No. 2", composer: "Frederic Chopin", file: "Frederic Chopin - Nocturne Op.9 No. 2.m4a" },
        { name: "Prélude à l'Après-midi d'un faune", composer: "Claude Debussy", file: "Claude Debussy - Prélude à l'Après-midi d'un faune.m4a" },
        { name: "New World Symphony (Symphony No. 9 in e minor), movement 1", composer: "Antonin Dvorak", file: "Antonin Dvorak - New World Symphony (Symphony No. 9 in e minor), movement 1.m4a" },
        { name: "Morning Mood (from Peer Gynt Suite)", composer: "Edvard Grieg", file: "Edvard Grieg - Morning Mood (from Peer Gynt Suite).m4a" },
        { name: "Country Band March", composer: "Charles Ives", file: "Charles Ives - Country Band March.m4a" },
        { name: "La Campanella", composer: "Franz Liszt", file: "Franz Liszt - La Campanella.m4a" },
        { name: "O Fortuna (from Carmina Burana)", composer: "Carl Off", file: "Carl Off - O Fortuna (from Carmina Burana).m4a" },
        { name: "Danse Macabre", composer: "Camille Saint-Saens", file: "Camille Saint-Saens - Danse Macabre.m4a" },
        { name: "Der Mondfleck (from Pierrot Lunaire)", composer: "Arnold Schoenberg", file: "Arnold Schoenberg - Der Mondfleck (from Pierrot Lunaire).m4a" },
        { name: "Erlkonig", composer: "Franz Schubert", file: "Franz Schubert - Erlkonig.m4a" },
        { name: "Rite of Spring", composer: "Igor Stravinsky", file: "Igor Stravinsky - Rite of Spring.m4a" },
        { name: "Ride of the Valkyries (from Die Valkure)", composer: "Richard Wagner", file: "Richard Wagner - Ride of the Valkyries (from Die Valkure).m4a" },
        { name: "Rhapsody in Blue", composer: "George Gershwin", file: "George Gershwin - Rhapsody in Blue.mp3" }
    ];

    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let historyList = [];
    let isReviewMode = false;
    let scoreChartInstance = null;

    // Custom Player Logic
    const player = document.getElementById('audio-player');
    const playBtn = document.getElementById('play-pause');
    const progressBar = document.getElementById('progress-bar');
    const progressContainer = document.getElementById('progress-container');
    const timeDisplay = document.getElementById('time-display');

    playBtn.addEventListener('click', () => {
        if (player.paused || player.ended) {
            player.play();
            playBtn.innerHTML = '<i data-lucide="pause"></i>';
        } else {
            player.pause();
            playBtn.innerHTML = '<i data-lucide="play"></i>';
        }
        lucide.createIcons();
    });

    // Reset button icon when audio ends naturally
    player.addEventListener('ended', () => {
        playBtn.innerHTML = '<i data-lucide="play"></i>';
        lucide.createIcons();
    });

    player.addEventListener('timeupdate', () => {
        const percent = (player.currentTime / player.duration) * 100;
        progressBar.style.width = `${percent}%`;
        
        const curMin = Math.floor(player.currentTime / 60);
        const curSec = Math.floor(player.currentTime % 60).toString().padStart(2, '0');
        const durMin = Math.floor(player.duration || 0) / 60;
        const durSec = Math.floor(player.duration || 0) % 60;
        
        if (!isNaN(player.duration)) {
            timeDisplay.innerText = `${curMin}:${curSec} / ${Math.floor(durMin)}:${Math.floor(durSec).toString().padStart(2, '0')}`;
        }
    });

    progressContainer.addEventListener('click', (e) => {
        const width = progressContainer.clientWidth;
        const clickX = e.offsetX;
        const duration = player.duration;
        player.currentTime = (clickX / width) * duration;
    });

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function initQuiz() {
        currentQuestions = shuffle([...tracks]);
        showQuestion();
    }

    function showQuestion() {
        const question = currentQuestions[currentIndex];
        document.getElementById('progress').innerText = `Question ${currentIndex + 1} of ${currentQuestions.length}`;
        player.src = `audio/${question.file}`;
        player.load();
        
        let playPromise = player.play();
        if (playPromise !== undefined) {
            playPromise.then(_ => {
                playBtn.innerHTML = '<i data-lucide="pause"></i>';
                lucide.createIcons();
            }).catch(error => {
                playBtn.innerHTML = '<i data-lucide="play"></i>';
                lucide.createIcons();
                console.log('Autoplay blocked:', error);
            });
        }
        
        progressBar.style.width = '0%';
        
        const feedback = document.getElementById('feedback');
        feedback.innerText = '';
        feedback.className = '';

        const nextBtn = document.getElementById('next-btn');
        nextBtn.classList.add('hidden');

        // Generate options (1 correct + 3 random)
        let options = [question];
        let others = tracks.filter(t => t.file !== question.file);
        shuffle(others);
        options = options.concat(others.slice(0, 3));
        shuffle(options);

        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        options.forEach(opt => {
            const btn = document.createElement('button');
            const label = `${opt.composer} - ${opt.name}`;
            btn.innerText = label;
            btn.onclick = () => checkAnswer(btn, opt, question);
            container.appendChild(btn);
        });
    }

    function checkAnswer(selectedBtn, selectedOpt, correctTrack) {
        const buttons = document.querySelectorAll('#options-container button');
        buttons.forEach(btn => btn.disabled = true);

        const feedback = document.getElementById('feedback');
        const correctLabel = `${correctTrack.composer} - ${correctTrack.name}`;

        if (selectedOpt.file === correctTrack.file) {
            selectedBtn.classList.add('correct');
            feedback.innerText = "Correct!";
            feedback.style.color = "#28a745";
            score++;
            historyList.push({ track: correctTrack, correct: true, selected: selectedOpt });
        } else {
            selectedBtn.classList.add('incorrect');
            feedback.innerText = `Incorrect. The answer was: ${correctLabel}`;
            feedback.style.color = "#dc3545";
            historyList.push({ track: correctTrack, correct: false, selected: selectedOpt });
            
            // Highlight the correct one
            buttons.forEach(btn => {
                if (btn.innerText === correctLabel) {
                    btn.classList.add('correct');
                }
            });
        }

        const nextBtn = document.getElementById('next-btn');
        nextBtn.classList.remove('hidden');
        nextBtn.onclick = () => {
            currentIndex++;
            if (currentIndex < currentQuestions.length) {
                showQuestion();
            } else {
                showResults();
            }
        };
    }

    function showResults() {
        // Stop audio when test finishes
        player.pause();
        player.currentTime = 0;
        playBtn.innerHTML = '<i data-lucide="play"></i>';

        document.getElementById('quiz-container').style.display = 'none';
        const scoreScreen = document.getElementById('score-screen');
        scoreScreen.style.display = 'block';
        
        const percentage = Math.round(score/currentQuestions.length*100);
        document.getElementById('final-score').innerText = `You scored ${score} out of ${currentQuestions.length} (${percentage}%)`;
        
        if (!isReviewMode) {
            const savedScores = JSON.parse(localStorage.getItem('musicMemoryScores') || '[]');
            savedScores.push({ date: new Date().toLocaleDateString(), score: percentage });
            localStorage.setItem('musicMemoryScores', JSON.stringify(savedScores));
            renderChart(savedScores);
        } else {
            const savedScores = JSON.parse(localStorage.getItem('musicMemoryScores') || '[]');
            renderChart(savedScores);
        }

        const overviewContainer = document.getElementById('overview-container');
        overviewContainer.innerHTML = '<h3>Overview of Answers:</h3><ul style="list-style: none; padding: 0;">' + 
            historyList.map((item, index) => {
                const color = item.correct ? 'green' : 'red';
                const icon = item.correct ? 'check-circle' : 'x-circle';
                let html = `<li style="margin-bottom: 15px; padding: 10px; border-left: 4px solid ${color}; background: #f9f9f9; border-radius: 4px;">`;
                html += `<div style="display: flex; align-items: center; gap: 8px; color: ${color}; font-weight: bold;"><i data-lucide="${icon}" style="width: 18px; height: 18px;"></i> Question ${index + 1}</div>`;
                html += `<div style="margin-top: 5px;"><strong>Song:</strong> ${item.track.composer} - ${item.track.name}</div>`;
                if (!item.correct) {
                    html += `<div style="margin-top: 5px; color: #555;"><em>You guessed: ${item.selected.composer} - ${item.selected.name}</em></div>`;
                }
                html += `</li>`;
                return html;
            }).join('') + '</ul>';

        // Show/hide review missed button
        if (historyList.some(item => !item.correct)) {
            document.getElementById('review-missed-btn').classList.remove('hidden');
        } else {
            document.getElementById('review-missed-btn').classList.add('hidden');
        }

        lucide.createIcons();
    }

    function reviewMissed() {
        const missedTracks = historyList.filter(item => !item.correct).map(item => item.track);
        currentQuestions = shuffle([...missedTracks]);
        currentIndex = 0;
        score = 0;
        historyList = [];
        isReviewMode = true;
        
        document.getElementById('score-screen').style.display = 'none';
        document.getElementById('quiz-container').style.display = 'block';
        showQuestion();
    }

    function renderChart(savedScores) {
        const ctx = document.getElementById('scoreChart').getContext('2d');
        if (scoreChartInstance) {
            scoreChartInstance.destroy();
        }
        
        const labels = savedScores.map((_, i) => `Attempt ${i + 1}`);
        const data = savedScores.map(s => s.score);

        scoreChartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Score (%)',
                    data: data,
                    borderColor: '#007bff',
                    backgroundColor: 'rgba(0, 123, 255, 0.1)',
                    tension: 0.3,
                    fill: true
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 100
                    }
                }
            }
        });
    }

    initQuiz();
</script>

</body>
</html>
